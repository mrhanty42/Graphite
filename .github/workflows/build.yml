name: Build Graphite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-rust:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libgraphite_core.so
            out_dir: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: graphite_core.dll
            out_dir: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libgraphite_core.dylib
            out_dir: macos
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libgraphite_core.dylib
            out_dir: macos-arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Build graphite-core
        run: cargo build --release --target ${{ matrix.target }} -p graphite-core

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.out_dir }}
          path: crates/target/${{ matrix.target }}/release/${{ matrix.artifact }}
          retention-days: 7

  build-test-mod:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libgraphite_test_mod.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: graphite_test_mod.dll
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libgraphite_test_mod.dylib

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
      - name: Build graphite-test-mod
        run: cargo build --release --target ${{ matrix.target }} -p graphite-test-mod
      - uses: actions/upload-artifact@v4
        with:
          name: test-mod-${{ matrix.os }}
          path: crates/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  verify-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify layout constants
        run: |
          python3 scripts/verify_layout.py \
            graphite-host/src/main/java/dev/graphite/host/SharedMemory.java \
            graphite-host/src/main/java/dev/graphite/host/commands/CommandType.java \
            graphite-host/src/main/java/dev/graphite/host/snapshot/WorldSnapshotWriter.java \
            -- \
            crates/graphite-api/src/protocol.rs

  build-java:
    needs: build-rust
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Linux native
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: graphite-host/src/main/resources/natives/linux/

      - name: Download Windows native
        uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: graphite-host/src/main/resources/natives/windows/

      - name: Download macOS native
        uses: actions/download-artifact@v4
        with:
          name: native-macos
          path: graphite-host/src/main/resources/natives/macos/

      - name: Download macOS ARM native
        uses: actions/download-artifact@v4
        with:
          name: native-macos-arm64
          path: graphite-host/src/main/resources/natives/macos-arm64/

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('graphite-host/**/*.gradle*', 'graphite-host/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build host mod
        working-directory: graphite-host
        run: ./gradlew build --no-daemon
